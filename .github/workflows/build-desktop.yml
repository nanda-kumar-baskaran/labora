name: Build Desktop Installer

on:
  push:
    tags:
      - 'v*'          # triggers on git tag v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          STORAGE_MODE: local
          NEXT_PUBLIC_APP_URL: http://localhost:3456

      - name: Copy static assets into standalone
        shell: bash
        run: |
          cp -r .next/static .next/standalone/.next/static || true
          cp -r public .next/standalone/public || true

      - name: Build Windows installer (.exe)
        run: npx electron-builder build --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: LabMS-Windows
          path: dist-electron/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          STORAGE_MODE: local
          NEXT_PUBLIC_APP_URL: http://localhost:3456

      - name: Copy static assets into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static || true
          cp -r public .next/standalone/public || true

      - name: Build macOS installer (.dmg)
        run: npx electron-builder build --mac --publish never

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: LabMS-macOS
          path: dist-electron/*.dmg
          retention-days: 30
