name: Build Desktop Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  STORAGE_MODE: local
  NEXT_PUBLIC_APP_URL: http://localhost:3456
  NEXT_PUBLIC_SUPABASE_URL: http://localhost
  NEXT_PUBLIC_SUPABASE_ANON_KEY: local
  SUPABASE_SERVICE_ROLE_KEY: local
  LOCAL_AUTH_SECRET: ci-build-secret-placeholder
  # Prevent electron binary download during npm install (electron-builder handles it)
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
  # Prevent sharp from downloading heavy binaries (not needed for build)
  SHARP_IGNORE_GLOBAL_LIBVIPS: "1"

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund
        timeout-minutes: 15

      - name: Build Next.js
        run: npm run build

      - name: Copy static assets into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static || true
          cp -r public .next/standalone/public || true

      - name: Build macOS installer (.dmg)
        run: npx --yes electron-builder build --mac --publish never

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: LabMS-macOS
          path: dist-electron/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund
        timeout-minutes: 15

      - name: Build Next.js
        run: npm run build

      - name: Copy static assets into standalone
        shell: bash
        run: |
          cp -r .next/static .next/standalone/.next/static || true
          cp -r public .next/standalone/public || true

      - name: Build Windows installer (.exe)
        run: npx --yes electron-builder build --win --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: LabMS-Windows
          path: dist-electron/*.exe
          if-no-files-found: error
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev libnss3 libxss1 \
            libxtst6 xauth xvfb libgbm-dev libsecret-1-dev rpm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund
        timeout-minutes: 15

      - name: Build Next.js
        run: npm run build

      - name: Copy static assets into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static || true
          cp -r public .next/standalone/public || true

      - name: Build Linux installer (.AppImage)
        run: npx --yes electron-builder build --linux --publish never

      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: LabMS-Linux
          path: dist-electron/*.AppImage
          if-no-files-found: error
          retention-days: 30
