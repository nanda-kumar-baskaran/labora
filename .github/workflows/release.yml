name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  STORAGE_MODE: local
  NEXT_PUBLIC_APP_URL: http://localhost:3456
  NEXT_PUBLIC_SUPABASE_URL: http://localhost
  NEXT_PUBLIC_SUPABASE_ANON_KEY: local
  SUPABASE_SERVICE_ROLE_KEY: local
  LOCAL_AUTH_SECRET: ci-build-secret-placeholder

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_glob: "dist-electron/*.dmg"
          - os: windows-latest
            platform: win
            artifact_glob: "dist-electron/*.exe"
          - os: ubuntu-latest
            platform: linux
            artifact_glob: "dist-electron/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev libnss3 libxss1 \
            libxtst6 xauth xvfb libgbm-dev libsecret-1-dev rpm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund --engine-strict=false
        env:
          npm_config_optional: true

      - name: Build Next.js standalone
        run: npm run build

      - name: Copy static assets into standalone
        shell: bash
        run: |
          cp -r .next/static .next/standalone/.next/static || true
          cp -r public        .next/standalone/public || true

      - name: Build Electron (${{ matrix.platform }})
        run: npx --yes electron-builder build --${{ matrix.platform }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LabMS-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
