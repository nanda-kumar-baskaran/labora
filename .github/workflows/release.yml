name: Build & Release

on:
  push:
    tags:
      - "v*"           # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_glob: "dist-electron/*.dmg"
          - os: windows-latest
            platform: win
            artifact_glob: "dist-electron/*.exe"
          - os: ubuntu-latest
            platform: linux
            artifact_glob: "dist-electron/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: labms/package-lock.json

      - name: Install dependencies
        working-directory: labms
        run: npm ci

      - name: Build Next.js standalone
        working-directory: labms
        run: npm run build

      - name: Copy static assets into standalone
        working-directory: labms
        shell: bash
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public        .next/standalone/public

      - name: Build Electron (${{ matrix.platform }})
        working-directory: labms
        run: npx electron-builder build --${{ matrix.platform }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LabMS-${{ matrix.platform }}
          path: labms/${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
