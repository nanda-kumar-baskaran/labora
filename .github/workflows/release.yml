name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  STORAGE_MODE: local
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3456
  NEXT_PUBLIC_SUPABASE_URL: http://localhost
  NEXT_PUBLIC_SUPABASE_ANON_KEY: local
  SUPABASE_SERVICE_ROLE_KEY: local
  LOCAL_AUTH_SECRET: ci-build-secret-placeholder
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_glob: "dist-electron/*.dmg"
          - os: windows-latest
            platform: win
            artifact_glob: "dist-electron/*.exe"
          - os: ubuntu-latest
            platform: linux
            artifact_glob: "dist-electron/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev libnss3 libxss1 \
            libxtst6 xauth xvfb libgbm-dev libsecret-1-dev rpm

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund
        timeout-minutes: 15

      - name: Build Next.js standalone
        run: npm run build

      - name: Prepare standalone bundle for packaging
        shell: bash
        run: |
          # Copy static assets and public dir into standalone
          cp -r .next/static .next/standalone/.next/static || true
          cp -r public        .next/standalone/public || true

          # Ensure next is in standalone/node_modules (Next.js traces it,
          # but copy from root if somehow missing)
          mkdir -p .next/standalone/node_modules
          if [ ! -d ".next/standalone/node_modules/next" ]; then
            echo "next missing from standalone — copying from root node_modules"
            cp -r node_modules/next .next/standalone/node_modules/next
          fi
          if [ ! -d ".next/standalone/node_modules/@next" ]; then
            cp -r node_modules/@next .next/standalone/node_modules/@next || true
          fi

          echo "standalone node_modules packages: $(ls .next/standalone/node_modules | wc -l)"
          echo "next present: $(ls .next/standalone/node_modules/next/package.json)"

          # CRITICAL: electron-builder detects package.json in the extraResources
          # source dir and automatically injects '!**/node_modules/**' exclusion,
          # stripping ALL node_modules from the bundle. Rename it so electron-builder
          # treats this as a plain directory, not a Node app.
          mv .next/standalone/package.json .next/standalone/package.json.bak

      - name: Build Electron (${{ matrix.platform }})
        run: npx --yes electron-builder build --${{ matrix.platform }} --publish never

      - name: Restore standalone package.json
        if: always()
        shell: bash
        run: mv .next/standalone/package.json.bak .next/standalone/package.json || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LabMS-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
