<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labora — Activate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #070d1a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 40px;
      max-width: 520px;
      width: 100%;
    }
    .logo { font-size: 40px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 600; color: #f1f5f9; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #64748b; margin-bottom: 28px; line-height: 1.5; }
    .machine-id-box {
      background: #1e293b;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }
    .machine-id-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 6px; }
    .machine-id-value {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      color: #94a3b8;
      word-break: break-all;
      cursor: pointer;
      user-select: all;
    }
    .copy-hint { font-size: 11px; color: #475569; margin-top: 4px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    textarea {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      padding: 12px;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #3b82f6; }
    .error {
      background: #1c0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-top: 12px;
      white-space: pre-wrap;
      display: none;
    }
    .error.visible { display: block; }
    button {
      margin-top: 16px;
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #1e3a5f; color: #64748b; cursor: not-allowed; }
    .contact {
      margin-top: 20px;
      font-size: 12px;
      color: #475569;
      text-align: center;
      line-height: 1.6;
    }
    .contact a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🧪</div>
    <h1>Activate Labora</h1>
    <p class="subtitle">
      Send your Machine ID below to receive your license key.
    </p>

    <div class="machine-id-box">
      <div class="machine-id-label">Your Machine ID</div>
      <div class="machine-id-value" id="machineId">Loading...</div>
      <div class="copy-hint">Click to select all · Ctrl+C / Cmd+C to copy</div>
    </div>

    <label for="licenseKey">License Key</label>
    <textarea id="licenseKey" placeholder="Paste your license key here..."></textarea>
    <div class="error" id="errorBox"></div>

    <button id="activateBtn">Activate</button>

    <div class="contact">
      Need a license? Contact <a href="mailto:support@labora.app">support@labora.app</a><br/>
      Include your Machine ID above.
    </div>
  </div>

  <script>
    const { ipcRenderer } = require("electron");

    // Load machine ID
    ipcRenderer.invoke("get-machine-id").then(id => {
      document.getElementById("machineId").textContent = id;
    });

    document.getElementById("activateBtn").addEventListener("click", async () => {
      const key = document.getElementById("licenseKey").value.trim();
      const btn = document.getElementById("activateBtn");
      const errBox = document.getElementById("errorBox");

      if (!key) {
        errBox.textContent = "Please paste your license key.";
        errBox.classList.add("visible");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Activating...";
      errBox.classList.remove("visible");

      const result = await ipcRenderer.invoke("activate-license", key);
      if (result.success) {
        btn.textContent = "✓ Activated!";
        setTimeout(() => ipcRenderer.invoke("restart-app"), 800);
      } else {
        errBox.textContent = result.reason;
        errBox.classList.add("visible");
        btn.disabled = false;
        btn.textContent = "Activate";
      }
    });
  </script>
</body>
</html>
